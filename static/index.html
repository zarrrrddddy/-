<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Картка лояльності</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0d1a;
    --card: #1a1730;
    --accent: #c6f135;
    --accent2: #ff5c7a;
    --text: #fdf6e3;
    --text-dim: rgba(253,246,227,0.55);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 40px;
    overflow-x: hidden;
  }

  .bg-glow {
    position: fixed;
    top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(198,241,53,0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; }

  .header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px;
    opacity: 0; animation: fadeUp 0.5s ease-out forwards;
  }
  .header .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header .greeting { font-size: 13px; color: var(--text-dim); }
  .header .name { font-size: 17px; font-weight: 700; }

  .card {
    background: linear-gradient(160deg, var(--card) 0%, #241f42 100%);
    border-radius: 24px;
    padding: 26px 22px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    opacity: 0; animation: fadeUp 0.6s ease-out 0.1s forwards;
  }
  .card::before {
    content: "";
    position: absolute; top: -40%; right: -20%;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(255,92,122,0.25), transparent 70%);
    border-radius: 50%;
  }

  .balance-label {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); margin-bottom: 6px; position: relative;
  }
  .balance-value {
    font-size: 52px; font-weight: 800; line-height: 1;
    color: var(--accent);
    position: relative;
    letter-spacing: -0.02em;
  }
  .balance-value span { font-size: 20px; font-weight: 600; color: var(--text-dim); margin-left: 6px; }

  .progress-section { margin-top: 22px; position: relative; }
  .progress-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px; font-size: 13px;
  }
  .progress-row .reward-name { font-weight: 600; }
  .progress-row .reward-left { color: var(--text-dim); }

  .progress-track {
    width: 100%; height: 10px; border-radius: 999px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    width: 0%;
    transition: width 1.1s cubic-bezier(.22,1,.36,1);
    position: relative;
  }
  .progress-fill::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    animation: shimmer 2s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .rewards-list { margin-top: 24px; opacity: 0; animation: fadeUp 0.6s ease-out 0.2s forwards; }
  .section-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); margin: 0 2px 10px;
  }
  .reward-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--card);
    border-radius: 16px; padding: 14px 16px; margin-bottom: 10px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .reward-item.unlocked { border-color: rgba(198,241,53,0.4); }
  .reward-icon {
    width: 36px; height: 36px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    background: rgba(255,255,255,0.06);
  }
  .reward-item.unlocked .reward-icon { background: rgba(198,241,53,0.18); }
  .reward-info { flex: 1; min-width: 0; }
  .reward-info .rname { font-weight: 600; font-size: 14px; }
  .reward-info .rcost { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .reward-check { font-size: 18px; color: var(--accent); }

  .history-section { margin-top: 24px; opacity: 0; animation: fadeUp 0.6s ease-out 0.3s forwards; }
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; background: var(--card); border-radius: 14px; margin-bottom: 8px;
    font-size: 13px;
  }
  .history-item .hnote { color: var(--text); }
  .history-item .hdate { color: var(--text-dim); font-size: 11px; margin-top: 2px; }
  .history-amount { font-weight: 700; }
  .history-amount.positive { color: var(--accent); }
  .history-amount.negative { color: var(--accent2); }

  .empty-state {
    text-align: center; padding: 30px 20px; color: var(--text-dim); font-size: 13px;
  }

  .loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 60vh; color: var(--text-dim); font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
    margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .confetti-piece {
    position: fixed; top: -10px; border-radius: 2px; pointer-events: none; z-index: 999;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(540deg); opacity: 0.2; }
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div id="loading" class="loading"><div class="spinner"></div>Завантажуємо картку…</div>
  <div id="app" class="wrap" style="display:none;">
    <div class="header">
      <div class="avatar">☕</div>
      <div>
        <div class="greeting">Картка лояльності</div>
        <div class="name" id="userName">—</div>
      </div>
    </div>

    <div class="card">
      <div class="balance-label">Твій баланс</div>
      <div class="balance-value" id="balanceValue">0<span>балів</span></div>

      <div class="progress-section" id="progressSection"></div>
    </div>

    <div class="rewards-list">
      <div class="section-title">Нагороди</div>
      <div id="rewardsList"></div>
    </div>

    <div class="history-section">
      <div class="section-title">Останні операції</div>
      <div id="historyList"></div>
    </div>
  </div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  function launchConfetti() {
    const colors = ['#c6f135', '#ff5c7a', '#a78bfa', '#ffc24b'];
    for (let i = 0; i < 24; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.width = (6 + Math.random() * 6) + 'px';
      el.style.height = (6 + Math.random() * 6) + 'px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (2 + Math.random() * 1.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }
  }

  async function loadData() {
    const initData = tg?.initData || '';
    try {
      const res = await fetch('/api/me?initData=' + encodeURIComponent(initData));
      const data = await res.json();
      render(data);
    } catch (e) {
      document.getElementById('loading').innerText = 'Не вдалось завантажити дані. Спробуй ще раз пізніше.';
    }
  }

  function render(data) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    document.getElementById('userName').textContent = data.name || 'Друже';
    document.getElementById('balanceValue').innerHTML = data.balance + '<span>балів</span>';

    const progressSection = document.getElementById('progressSection');
    const rewardsList = document.getElementById('rewardsList');
    progressSection.innerHTML = '';
    rewardsList.innerHTML = '';

    const nextReward = data.rewards.find(r => data.balance < r.cost);
    if (nextReward) {
      const pct = Math.min(100, Math.round((data.balance / nextReward.cost) * 100));
      progressSection.innerHTML = `
        <div class="progress-row">
          <span class="reward-name">${nextReward.name}</span>
          <span class="reward-left">ще ${nextReward.cost - data.balance}</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="fillBar"></div></div>
      `;
      setTimeout(() => {
        const fill = document.getElementById('fillBar');
        if (fill) fill.style.width = pct + '%';
      }, 150);
    } else {
      progressSection.innerHTML = `<div class="progress-row"><span class="reward-name">🎉 Всі нагороди відкриті!</span></div>`;
    }

    data.rewards.forEach(r => {
      const unlocked = data.balance >= r.cost;
      const div = document.createElement('div');
      div.className = 'reward-item' + (unlocked ? ' unlocked' : '');
      div.innerHTML = `
        <div class="reward-icon">${unlocked ? '🎁' : '☕'}</div>
        <div class="reward-info">
          <div class="rname">${r.name}</div>
          <div class="rcost">${r.cost} балів</div>
        </div>
        ${unlocked ? '<div class="reward-check">✓</div>' : ''}
      `;
      rewardsList.appendChild(div);
    });

    const historyList = document.getElementById('historyList');
    if (!data.history || data.history.length === 0) {
      historyList.innerHTML = '<div class="empty-state">Поки що порожньо. Замов щось смачне ☕</div>';
    } else {
      data.history.forEach(h => {
        const positive = h.amount >= 0;
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <div>
            <div class="hnote">${h.note || (positive ? 'Нарахування балів' : 'Списання балів')}</div>
            <div class="hdate">${h.date}</div>
          </div>
          <div class="history-amount ${positive ? 'positive' : 'negative'}">${positive ? '+' : ''}${h.amount}</div>
        `;
        historyList.appendChild(div);
      });
    }

    if (data.just_unlocked) launchConfetti();
  }

  loadData();
</script>
</body>
</html>
